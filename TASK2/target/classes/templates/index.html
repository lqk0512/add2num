<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Big Number</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="container mt-5">

<h2>Big Number Addition</h2>

<form method="post" action="/sum">
    <input class="form-control mb-2" name="a" placeholder="Number 1">
    <input class="form-control mb-2" name="b" placeholder="Number 2">
    <button class="btn btn-primary">Calculate</button>
</form>

<hr>

<h4>Result:</h4>
<div class="alert alert-success" th:if="${result != null}">
    <span th:text="${result}"></span>
</div>

<h4>Steps:</h4>
<ul class="list-group">
    <li class="list-group-item"
        th:each="s : ${steps}"
        th:text="${s}">
    </li>
</ul>

</body>
</html>
